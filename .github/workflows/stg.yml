name: Staging Workflow
on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup Environment
    uses: ./.github/workflows/setup-env.yml

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Staging
        run: echo "Deploying to staging environment..."
